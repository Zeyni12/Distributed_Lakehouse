name: ecommerce_dbt
version: "1.0"
config-version: 2

profile: ecommerce_trino

model-paths: ["models"]
seed-paths: ["seeds"]

models:
  ecommerce_dbt:
    bronze:
      +schema: bronze
    silver:
      +schema: silver
    gold:
      +schema: gold

seeds:
  ecommerce_dbt:
    +schema: raw