version: 2

models:
  - name: bronze_customer_events
    description: Raw customer events
    columns:
      - name: event_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: event_timestamp
        tests:
          - not_null

  - name: bronze_inventory_snapshots
    description: Raw inventory snapshots
    columns:
      - name: snapshot_id
        tests:
          - unique
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: quantity_on_hand
        tests:
          - not_null

  - name: bronze_payment_transactions
    description: Raw payment transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null

      - name: amount
        tests:
          - not_null

  - name: bronze_support_tickets
    description: Raw support tickets
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null      